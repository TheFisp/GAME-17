<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pazienza...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        #display-text {
            font-size: 4rem;
            cursor: pointer;
            text-align: center;
            max-width: 80%;
            color: #444;
            min-height: 8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s ease;
        }

        .click-pulse {
            transform: scale(1.15);
        }

        #display-text.active-msg {
            font-size: 2.2rem;
            color: #ff4d4d;
            font-style: italic;
            text-shadow: 0 0 15px rgba(255, 77, 77, 0.5);
        }

        #secret-button {
            display: none;
            margin-top: 50px;
            padding: 15px 30px;
            font-size: 1.5rem;
            background-color: transparent;
            border: 2px solid #ff0055;
            color: #ff0055;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
            z-index: 10;
        }

        #secret-button:hover {
            background-color: #ff0055;
            color: #000;
            box-shadow: 0 0 25px #ff0055;
        }

        #win-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            text-align: center;
        }

        .win-title {
            font-size: 7rem;
            font-weight: 900;
            color: #00ff41;
            text-shadow: 0 0 40px #00ff41;
            animation: oscillate 2s infinite ease-in-out;
        }

        @keyframes oscillate {
            0%, 100% { transform: translateX(-35px) rotate(-4deg); }
            50% { transform: translateX(35px) rotate(4deg); }
        }

        .clue {
            margin-top: 40px;
            font-size: 2rem;
            color: #fff;
            max-width: 85%;
            font-weight: 300;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="display-text">...</div>
    <button id="secret-button">NON CLICCARE</button>

    <div id="win-overlay">
        <canvas id="confetti"></canvas>
        <div class="win-title">HAI VINTO</div>
        <div class="clue">Il tuo indizio: La pazienza è chiave, specialmente nello studio.</div>
    </div>

    <script>
        let clickCount = 0;
        const displayText = document.getElementById('display-text');
        const secretBtn = document.getElementById('secret-button');
        const winOverlay = document.getElementById('win-overlay');

        // Ho aggiunto diverse nuove frasi qui sotto
        const phrases = [
            "Lascia perdere",
            "Non troverai nulla qua",
            "Stai perdendo il tuo tempo",
            "Davvero? Ancora?",
            "Perché continui?",
            "È inutile.",
            "Torna a studiare.",
            "Il mouse si sta stancando",
            "Niente da fare, eh?",
            "La perseveranza è un dono, ma qui è sprecata",
            "Cerca un hobby meglio di questo",
            "Loading... scherzo, non carica nulla",
            "Ti vedo motivato, ma non serve a niente",
            "E se ti dicessi che non c'è nessun tasto?",
            "Hai premuto abbastanza, ora riposati",
            "Ops! Hai mancato il premio... ah no, non c'è",
            "Guarda dietro di te! (Scherzavo)",
            "Dovresti fare qualcosa di produttivo"
        ];

        displayText.addEventListener('click', () => {
            clickCount++;
            displayText.classList.add('click-pulse');
            setTimeout(() => {
                displayText.classList.remove('click-pulse');
            }, 150);

            if (clickCount % 20 === 0) {
                const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
                displayText.innerText = randomPhrase;
                displayText.classList.add('active-msg');
                
                setTimeout(() => {
                    displayText.innerText = "...";
                    displayText.classList.remove('active-msg');
                }, 2000);
            }
        });

        // --- TIMER 3 MINUTI (180.000 ms) ---
        const tempoAttesa = 180000; 

        setTimeout(() => {
            secretBtn.style.display = 'block';
        }, tempoAttesa);

        secretBtn.addEventListener('click', () => {
            winOverlay.style.display = 'flex';
            initConfetti();
        });

        function initConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            for (let i = 0; i < 180; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 8 + 2,
                    speed: Math.random() * 5 + 2,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    drift: Math.random() * 2 - 1
                });
            }

            function update() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.y += p.speed;
                    p.x += p.drift;
                    if (p.y > canvas.height) p.y = -20;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                });
                requestAnimationFrame(update);
            }
            update();
        }
    </script>
</body>
</html>
